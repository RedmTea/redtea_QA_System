{% extends "base.html" %}

{% block extra_css %}
<style>
    .module-page {
        padding: 1.5rem;
        background:
            radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 24rem),
            linear-gradient(180deg, #fffdf7 0%, #f8fafc 28%, #f5f7fb 100%);
        min-height: calc(100vh - var(--header-height));
    }

    .module-shell {
        display: grid;
        gap: 1.25rem;
    }

    .module-hero {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(217, 119, 6, 0.12);
        border-radius: 1.5rem;
        padding: 1.5rem;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #92400e 100%);
        color: #fff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
    }

    .module-hero::after {
        content: "";
        position: absolute;
        inset: auto -3rem -3rem auto;
        width: 12rem;
        height: 12rem;
        border-radius: 999px;
        background: rgba(251, 191, 36, 0.18);
        filter: blur(8px);
    }

    .module-hero-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
    }

    .module-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: #fde68a;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
    }

    .module-title {
        margin-top: 1rem;
        margin-bottom: 0.65rem;
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.15;
    }

    .module-subtitle {
        max-width: 48rem;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.98rem;
    }

    .prototype-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff7ed;
        font-size: 0.82rem;
    }

    .hero-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.85rem;
        margin-top: 1.5rem;
        position: relative;
        z-index: 1;
    }

    .hero-metric {
        padding: 1rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
    }

    .hero-metric .metric-label {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.82rem;
    }

    .hero-metric .metric-value {
        margin-top: 0.4rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
    }

    .module-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 1.25rem;
    }

    .panel-card {
        border-radius: 1.25rem;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        overflow: hidden;
    }

    .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1.15rem 1.25rem;
        border-bottom: 1px solid rgba(226, 232, 240, 0.9);
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(255, 255, 255, 0.95));
    }

    .panel-title {
        font-size: 1rem;
        font-weight: 700;
        color: #0f172a;
    }

    .panel-subtitle {
        font-size: 0.82rem;
        color: #64748b;
    }

    .panel-body {
        padding: 1.25rem;
    }

    .filter-bar {
        display: grid;
        grid-template-columns: 1.4fr repeat(2, 0.8fr) auto;
        gap: 0.85rem;
        margin-bottom: 1rem;
    }

    .filter-input,
    .filter-select {
        width: 100%;
        padding: 0.8rem 0.95rem;
        border-radius: 0.9rem;
        border: 1px solid #dbe4ee;
        background: #fff;
        color: #0f172a;
        font-size: 0.92rem;
    }

    .filter-input:focus,
    .filter-select:focus {
        outline: none;
        border-color: #f59e0b;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.14);
    }

    .ghost-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        padding: 0.8rem 1rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(245, 158, 11, 0.2);
        background: #fff7ed;
        color: #b45309;
        font-weight: 600;
    }

    .badge-soft {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.28rem 0.65rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 600;
    }

    .badge-soft.blue {
        background: #dbeafe;
        color: #1d4ed8;
    }

    .badge-soft.amber {
        background: #fef3c7;
        color: #b45309;
    }

    .badge-soft.green {
        background: #dcfce7;
        color: #15803d;
    }

    .badge-soft.red {
        background: #fee2e2;
        color: #b91c1c;
    }

    .badge-soft.slate {
        background: #e2e8f0;
        color: #334155;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
    }

    .data-table th,
    .data-table td {
        padding: 0.95rem 0.8rem;
        border-bottom: 1px solid #eef2f7;
        text-align: left;
        vertical-align: top;
        font-size: 0.9rem;
    }

    .data-table th {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
    }

    .data-table tbody tr:hover {
        background: rgba(248, 250, 252, 0.85);
    }

    .card-list {
        display: grid;
        gap: 0.9rem;
    }

    .mini-card {
        padding: 1rem;
        border: 1px solid #edf2f7;
        border-radius: 1rem;
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .mini-card-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #0f172a;
    }

    .mini-card-text {
        margin-top: 0.45rem;
        color: #64748b;
        font-size: 0.86rem;
        line-height: 1.55;
    }

    .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
    }

    .meta-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: #f8fafc;
        color: #475569;
        font-size: 0.78rem;
    }

    .stat-stack {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.9rem;
    }

    .stat-box {
        padding: 1rem;
        border-radius: 1rem;
        background: #fff;
        border: 1px solid #edf2f7;
    }

    .stat-box-label {
        color: #64748b;
        font-size: 0.78rem;
    }

    .stat-box-value {
        margin-top: 0.45rem;
        font-size: 1.45rem;
        font-weight: 700;
        color: #0f172a;
    }

    .timeline {
        display: grid;
        gap: 0.85rem;
    }

    .timeline-item {
        position: relative;
        padding-left: 1.25rem;
        color: #475569;
        font-size: 0.9rem;
    }

    .timeline-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.45rem;
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #f59e0b, #ea580c);
    }

    .bar-list {
        display: grid;
        gap: 0.85rem;
    }

    .bar-row {
        display: grid;
        grid-template-columns: 8rem 1fr auto;
        align-items: center;
        gap: 0.75rem;
    }

    .bar-track {
        height: 0.75rem;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #f59e0b, #f97316);
    }

    .trend-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.9rem;
    }

    .trend-card {
        padding: 1rem;
        border-radius: 1rem;
        background: linear-gradient(180deg, #fff 0%, #fffaf2 100%);
        border: 1px solid rgba(245, 158, 11, 0.14);
    }

    .trend-card-value {
        font-size: 1.55rem;
        font-weight: 700;
        color: #0f172a;
    }

    .trend-card-label {
        margin-top: 0.3rem;
        color: #64748b;
        font-size: 0.8rem;
    }

    .trend-card-delta {
        margin-top: 0.55rem;
        color: #15803d;
        font-size: 0.82rem;
        font-weight: 600;
    }

    @media (max-width: 1200px) {
        .hero-metrics,
        .trend-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .module-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 768px) {
        .module-page {
            padding: 1rem;
        }

        .filter-bar,
        .stat-stack,
        .hero-metrics,
        .trend-grid {
            grid-template-columns: 1fr;
        }

        .bar-row {
            grid-template-columns: 1fr;
        }

        .module-title {
            font-size: 1.6rem;
        }
    }
</style>
{% block module_css %}{% endblock %}
{% endblock %}

{% block content %}
<section class="module-page">
    <div class="module-shell">
        {% block module_content %}{% endblock %}
    </div>
</section>
{% endblock %}
